name: Trigger auto deployment for sssssssssssss

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sssssssssssss-AutoDeployTrigger-1d9bb2e0-27bd-4e15-9ebb-cf5138615199.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.SSSSSSSSSSSSS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SSSSSSSSSSSSS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SSSSSSSSSSSSS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: 
          registryUsername: ${{ secrets.SSSSSSSSSSSSS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SSSSSSSSSSSSS_REGISTRY_PASSWORD }}
          containerAppName: sssssssssssss
          resourceGroup: shiv
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


